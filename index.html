<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>FitApp</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx)}
button,input,textarea{font-family:'Outfit',sans-serif;outline:none;border:none;background:none}
img{display:block}
:root{
  --bg:#f8fafc;--su:#fff;--s2:#f1f5f9;--bd:#e2e8f0;--b2:#cbd5e1;
  --ac:#6366f1;--ab:#eef2ff;--tx:#0f172a;--t2:#475569;--t3:#94a3b8;
  --ok:#10b981;--ob:#ecfdf5;--er:#ef4444;--eb:#fef2f2;--wn:#f59e0b;--wb:#fffbeb;
  --sh:0 1px 3px #0000000d;--sm:0 4px 16px #0000001a;--ov:#00000066;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#080c14;--su:#0f1520;--s2:#1e2535;--bd:#2a3548;--b2:#334155;
  --ac:#818cf8;--ab:#1e1b4b;--tx:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
  --ok:#34d399;--ob:#052e16;--er:#f87171;--eb:#450a0a;--wn:#fbbf24;--wb:#1c1402;
  --sh:0 1px 4px #00000055;--sm:0 4px 24px #00000077;--ov:#000000aa;
}}
@keyframes spin{0%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}100%{transform:rotate(-15deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:860px){
  .botnav{display:none!important}
  .sidebar{display:flex!important}
  .main{height:100vh;overflow-y:auto}
}
.botnav{position:fixed;bottom:0;left:0;right:0;background:var(--su);border-top:1px solid var(--bd);display:flex;z-index:200}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:5px}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="font-size:52px;animation:spin 1.5s infinite">🏋️</div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script>

// ═══════════════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyAzUBF4J8qtZarmY3raagkgZw62i5AEWOo",
  authDomain:"fitapp-6a61e.firebaseapp.com",
  databaseURL:"https://fitapp-6a61e-default-rtdb.firebaseio.com",
  projectId:"fitapp-6a61e",
  storageBucket:"fitapp-6a61e.firebasestorage.app",
  messagingSenderId:"893201513875",
  appId:"1:893201513875:web:331c4b0f1256aa72c67c66"
});
const db=firebase.database();
// shims para manter o resto do código idêntico à API modular
const ref=(database,path)=>database.ref(path);
const onValue=(reference,cb)=>reference.on('value',snap=>cb({exists:()=>snap.exists(),val:()=>snap.val()}));
const fbset=(path,val)=>db.ref(path).set(val);

// ═══════════════════════════════════════════════════════════════
//  CONSTANTES E HELPERS PUROS
// ═══════════════════════════════════════════════════════════════
const GOAL=4, FINE=5;
const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
// Modalidades padrão (estilo Gymrats/Hevy). "Outro" abre campo livre.
const EXERCISES=['🏋️ Musculação','🏃 Corrida','🚶 Caminhada','🚴 Bike','🔥 Funcional','⚡ HIIT','🧘 Yoga','🤸 Pilates','🥊 Luta / Boxe','🎾 Tênis','🏐 Vôlei','🏖️ Futevôlei','⚽ Futebol','🏊 Natação','🧗 Escalada','⛹️ Crossfit','🏀 Basquete','✍️ Outro'];
const PALETTE=['#6366f1','#10b981','#f59e0b','#ef4444','#06b6d4','#a855f7','#ec4899','#14b8a6','#f97316','#8b5cf6','#84cc16','#f43f5e','#0ea5e9','#d946ef','#22c55e','#eab308','#3b82f6','#64748b','#e11d48','#0891b2'];

const colorOf=name=>{let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return PALETTE[h%PALETTE.length]};
const monday=(d=new Date())=>{const x=new Date(d);x.setHours(0,0,0,0);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x.toISOString().slice(0,10)};
const weekDates=mon=>{const s=new Date(mon+'T00:00:00');return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d.toISOString().slice(0,10)})};
const fmtMoney=v=>`R$ ${v.toFixed(2).replace('.',',')}`;
const fmtDate=iso=>new Date(iso+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
const timeAgo=ts=>{const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'agora';if(m<60)return m+'min';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'};
const dispName=login=>login?login.split(/[._]/).map(p=>p[0].toUpperCase()+p.slice(1).toLowerCase()).join(' '):'';
const firstName=login=>login?login.split(/[._]/)[0][0].toUpperCase()+login.split(/[._]/)[0].slice(1).toLowerCase():'';
const validLogin=s=>/^[a-zA-ZÀ-ÿ]+\.[a-zA-ZÀ-ÿ]+$/.test(s.trim());
// Firebase não aceita '.' em chaves. Internamente usamos '_' no lugar do ponto.
// keyOf: login "joao.silva" -> chave "joao_silva" (usada no Firebase e em D.*)
// Todo o estado D.users/pw/photos/workouts usa a CHAVE (com _). A exibição
// reconstrói o nome a partir da chave, então o ponto nunca chega ao Firebase.
const keyOf=login=>login.replace(/\./g,'_');
// Firebase devolve array de 1 item como objeto {0:"x"} — normaliza sempre para array de strings
const toArr=v=>!v?[]:Array.isArray(v)?v:Object.values(v);
const NOW=monday(); // segunda-feira da semana atual; imutável durante a sessão

// ═══════════════════════════════════════════════════════════════
//  SESSÃO PERSISTENTE
// ═══════════════════════════════════════════════════════════════
const SESSION_KEY='fitapp_session';
const saveSession=u=>{try{u?localStorage.setItem(SESSION_KEY,JSON.stringify(u)):localStorage.removeItem(SESSION_KEY)}catch{}};
const loadSession=()=>{try{const s=localStorage.getItem(SESSION_KEY);return s?JSON.parse(s):null}catch{return null}};

// ═══════════════════════════════════════════════════════════════
//  ESTADO GLOBAL — fonte única da verdade
//  Todas as abas leem daqui. Firebase escreve aqui. Nunca há merge.
// ═══════════════════════════════════════════════════════════════
const D={
  // dados do Firebase
  users:{},      // { login: {name, mod, createdAt} }
  pw:{},         // { login: senha }
  photos:{},     // { login: base64 }
  workouts:{},   // { weekKey: { login: [dateStr, ...] } }
  posts:[],      // array de posts, ordenado por ts desc
  payments:{},   // { "weekKey_login": true }  -> multas já pagas/quitadas
  // sessão e UI
  user:(()=>{const s=loadSession();if(s&&s.login)s.login=s.login.replace(/\./g,'_');return s})(),
  view:'feed',
  week:NOW,
  profMonth:new Date().toISOString().slice(0,7), // "YYYY-MM" do calendário do Perfil
  loginMode:'choose',  // choose | login | register
  modal:null,          // null | 'post' | 'comments' | 'editMenu' | 'editPost'
  postDate:null,
  postImg:null,
  postExercise:'',     // modalidade escolhida no seletor
  editId:null,         // id do post sendo editado
  posting:false,
  cmPost:null,         // id do post aberto no modal de comentários
  toast:null,
  ready:false,
};

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════
let _toastTimer;
const toast=(msg,isErr)=>{clearTimeout(_toastTimer);D.toast={msg,isErr};render();_toastTimer=setTimeout(()=>{D.toast=null;render()},2800)};

// ═══════════════════════════════════════════════════════════════
//  GETTERS DERIVADOS
//  É aqui que a integração entre abas acontece: todas as abas
//  calculam seus números a partir destes getters, que leem D.
// ═══════════════════════════════════════════════════════════════
const allMembers=()=>Object.keys(D.users).sort();
const daysOf=(login,week)=>toArr(D.workouts[week]?.[login]).filter(d=>typeof d==='string');
const countOf=(login,week)=>daysOf(login,week).length;
const totalDaysOf=login=>Object.keys(D.workouts).reduce((a,w)=>a+countOf(login,w),0);
const myPhoto=()=>D.photos[D.user?.login]||null;
// Posts da semana selecionada, apenas de membros válidos
const feedPosts=()=>{
  const valid=new Set(allMembers());
  const wd=new Set(weekDates(D.week));
  return D.posts.filter(p=>wd.has(p.date)&&(valid.size===0||valid.has(p.member)));
};
// Todos os posts de membros válidos (usado pela aba Treino p/ achar a foto do dia)
const validPosts=()=>{
  const valid=new Set(allMembers());
  return D.posts.filter(p=>valid.size===0||valid.has(p.member));
};

// --- Getters para Dashboard / Perfil / Caixa ---
// Multa da semana para um membro: (meta - dias) * valor, nunca negativo
const fineOf=(login,week)=>Math.max(0,GOAL-countOf(login,week))*FINE;
// Semanas que já contam para multa: as ativas anteriores à atual (a semana corrente
// ainda está em andamento, então não cobra). Inclui qualquer semana com registro.
const closedWeeks=()=>activeWeeks().filter(w=>w<NOW);
// Chave de pagamento
const payKey=(week,login)=>`${week}_${login}`;
const isPaid=(week,login)=>!!D.payments[payKey(week,login)];
// Lista de multas de um membro (só semanas fechadas com multa > 0)
const memberFines=login=>closedWeeks()
  .map(w=>({week:w,amount:fineOf(login,w),paid:isPaid(w,login)}))
  .filter(f=>f.amount>0);
// Totais de um membro
const memberOwed=login=>memberFines(login).filter(f=>!f.paid).reduce((a,f)=>a+f.amount,0);
const memberPaid=login=>memberFines(login).filter(f=>f.paid).reduce((a,f)=>a+f.amount,0);
// Totais do grupo
const groupOwed=()=>allMembers().reduce((a,m)=>a+memberOwed(m),0);
const groupPaid=()=>allMembers().reduce((a,m)=>a+memberPaid(m),0);
// Evolução do caixa: saldo acumulado (multas pagas) semana a semana fechada
const cashEvolution=()=>{
  const weeks=closedWeeks();
  let acc=0;
  return weeks.map(w=>{
    // soma das multas pagas referentes a essa semana
    const paidThisWeek=allMembers().reduce((a,m)=>a+(isPaid(w,m)?fineOf(m,w):0),0);
    acc+=paidThisWeek;
    return {week:w,total:acc};
  });
};
// Contribuição por participante: total de multas pagas, ordenado desc
const contributions=()=>allMembers()
  .map(m=>({m,paid:memberPaid(m)}))
  .sort((a,b)=>b.paid-a.paid||a.m.localeCompare(b.m));
// Todas as semanas que têm pelo menos 1 treino de qualquer membro
const activeWeeks=()=>{
  const set=new Set();
  Object.keys(D.workouts).forEach(w=>{
    if(Object.values(D.workouts[w]||{}).some(arr=>toArr(arr).length>0))set.add(w);
  });
  return [...set].sort();
};
// Para gráficos: sempre inclui a semana atual mesmo sem treinos ainda
const dashWeeks=()=>[...new Set([...activeWeeks(),NOW])].sort();
// Total de treinos do grupo inteiro
const groupTotal=()=>allMembers().reduce((a,m)=>a+totalDaysOf(m),0);
// Posts de um membro (para contar modalidades)
const postsOf=login=>D.posts.filter(p=>p.member===login);
// Contagem de modalidades do grupo todo: {modalidade: quantas vezes}
const modalityCounts=()=>{
  const counts={};
  D.posts.forEach(p=>{if(p.title){counts[p.title]=(counts[p.title]||0)+1}});
  return counts;
};
// --- Getters de Perfil ---
// Todos os dias treinados por um membro (varrendo todas as semanas), como Set de "YYYY-MM-DD"
const allTrainedDays=login=>{
  const set=new Set();
  Object.keys(D.workouts).forEach(w=>daysOf(login,w).forEach(d=>set.add(d)));
  return set;
};
// Modalidades de um membro específico: {modalidade: vezes}
const myModalities=login=>{
  const counts={};
  D.posts.filter(p=>p.member===login).forEach(p=>{if(p.title)counts[p.title]=(counts[p.title]||0)+1});
  return counts;
};
// Posição de um membro no ranking de treinos (1-based)
const rankPosition=login=>{
  const ranked=allMembers().map(m=>({m,t:totalDaysOf(m)})).sort((a,b)=>b.t-a.t||a.m.localeCompare(b.m));
  return ranked.findIndex(r=>r.m===login)+1;
};
// Quantas semanas (com atividade) o membro bateu a meta
const weeksGoalHit=login=>activeWeeks().filter(w=>countOf(login,w)>=GOAL).length;
// Últimas N semanas (incluindo a atual) com a contagem de treinos do membro
const weeklyEvolution=(login,n=8)=>{
  const weeks=[];
  let cur=new Date(NOW+'T00:00:00');
  for(let i=0;i<n;i++){
    const wk=cur.toISOString().slice(0,10);
    weeks.unshift({week:wk,count:countOf(login,wk)});
    cur.setDate(cur.getDate()-7);
  }
  return weeks;
};
// Sequência atual de semanas consecutivas batendo a meta (de trás pra frente a partir de agora)
const goalStreak=login=>{
  let streak=0;
  let cur=new Date(NOW+'T00:00:00');
  // não conta a semana atual se ela ainda não bateu a meta (está em andamento)
  for(let i=0;i<52;i++){
    const wk=cur.toISOString().slice(0,10);
    const hit=countOf(login,wk)>=GOAL;
    if(wk===NOW){ if(hit)streak++; }   // semana atual só conta se já bateu
    else if(hit)streak++;
    else break;
    cur.setDate(cur.getDate()-7);
  }
  return streak;
};
// Média de treinos por semana (sobre semanas ativas)
const avgPerWeek=login=>{
  const weeks=activeWeeks();
  if(!weeks.length)return 0;
  const total=weeks.reduce((a,w)=>a+countOf(login,w),0);
  return (total/weeks.length);
};
// Melhor semana (mais treinos numa única semana) — retorna {count, week}
const bestWeekCount=login=>{
  const weeks=activeWeeks();
  if(!weeks.length)return {count:0,week:null};
  let best={count:-1,week:null};
  weeks.forEach(w=>{const c=countOf(login,w);if(c>best.count)best={count:c,week:w}});
  return best;
};
// ═══════════════════════════════════════════════════════════════
//  FIREBASE LISTENERS
//  Cada listener atualiza sua fatia de D e chama render().
//  ready=true assim que users ou posts responderem (o que vier primeiro).
// ═══════════════════════════════════════════════════════════════
onValue(ref(db,'users'),snap=>{
  D.users=snap.exists()?snap.val():{};
  // valida sessão: só desloga se Firebase confirmar que há usuários e o login sumiu
  if(D.user){
    const total=Object.keys(D.users).length;
    if(total>0 && !D.users[D.user.login]){saveSession(null);D.user=null;D.loginMode='choose';}
    else if(D.users[D.user.login])D.user.mod=!!D.users[D.user.login].mod;
  }
  D.ready=true; render();
});
onValue(ref(db,'passwords'),snap=>{D.pw=snap.exists()?snap.val():{};render()});
onValue(ref(db,'photos'),snap=>{D.photos=snap.exists()?snap.val():{};render()});
onValue(ref(db,'payments'),snap=>{D.payments=snap.exists()?snap.val():{};render()});
onValue(ref(db,'workouts'),snap=>{
  if(!snap.exists()){D.workouts={};render();return;}
  const raw=snap.val(); const wo={};
  Object.keys(raw).forEach(week=>{
    wo[week]={};
    Object.keys(raw[week]||{}).forEach(login=>{
      wo[week][login]=toArr(raw[week][login]).filter(d=>typeof d==='string');
    });
  });
  D.workouts=wo; render();
});
onValue(ref(db,'posts'),snap=>{
  D.posts=snap.exists()?Object.values(snap.val()).sort((a,b)=>b.ts-a.ts):[];
  D.ready=true; render();
});
// libera a UI após 4s mesmo se o Firebase não responder
setTimeout(()=>{if(!D.ready){D.ready=true;render()}},4000);

// auto-logout por inatividade (30 min) — não apaga dados, só a sessão local
let _inactivity;
const resetInactivity=()=>{clearTimeout(_inactivity);if(!D.user)return;_inactivity=setTimeout(()=>{saveSession(null);D.user=null;D.loginMode='choose';render();toast('Sessão encerrada por inatividade')},30*60*1000)};
['click','touchstart','keydown'].forEach(ev=>document.addEventListener(ev,resetInactivity,{passive:true}));

// reage à troca de tema claro/escuro
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',render);

// ═══════════════════════════════════════════════════════════════
//  COMPONENTES VISUAIS REUTILIZÁVEIS
// ═══════════════════════════════════════════════════════════════
const avatar=(login,photo,size=36)=>{
  const c=colorOf(login),initial=(login||'?')[0].toUpperCase();
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0;background:${photo?'transparent':c+'22'};border:2px solid ${c}44;display:flex;align-items:center;justify-content:center">${photo?`<img src="${photo}" style="width:100%;height:100%;object-fit:cover"/>`:`<span style="font-weight:700;font-size:${size*.38}px;color:${c}">${initial}</span>`}</div>`;
};
const progressRing=(pct,size,c)=>{
  const r=(size-6)/2, circ=2*Math.PI*r;
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="5"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-Math.min(1,pct))}" stroke-linecap="round"/></svg>`;
};

// ═══════════════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function render(){
  const el=document.getElementById('app');
  if(!el)return;
  if(!D.ready){el.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center"><div style="font-size:52px;animation:spin 1.5s infinite">🏋️</div></div>`;return;}
  if(!D.user){el.innerHTML=renderLogin();return;}

  const toastHtml=D.toast?`<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);background:${D.toast.isErr?'var(--er)':'var(--ok)'};color:#fff;border-radius:12px;padding:10px 20px;font-weight:600;font-size:14px;z-index:999;white-space:nowrap;box-shadow:var(--sm)">${D.toast.msg}</div>`:'';

  // Abas: Feed e Treinos ativas; as outras 3 chegam nas próximas etapas
  const TABS=[['feed','🏠','Feed'],['log','📅','Treinos'],['dashboard','📊','Dashboard'],['perfil','👤','Perfil'],['caixa','💰','Caixa']];
  const isWeekView=['feed','log'].includes(D.view);
  const wd=weekDates(D.week), today=new Date().toISOString().slice(0,10), isNow=D.week===NOW;
  const weekLabel=isNow?`<span style="color:var(--ac);font-weight:700">Esta semana</span>`:`${fmtDate(wd[0])} — ${fmtDate(wd[6])}`;

  const sidebar=`<div class="sidebar" style="display:none;flex-direction:column;width:220px;flex-shrink:0;background:var(--su);border-right:1px solid var(--bd);position:sticky;top:0;height:100vh;padding:20px 12px;overflow-y:auto">
    <div style="font-weight:700;font-size:18px;color:var(--ac);margin-bottom:20px">💪 FitApp</div>
    <div style="background:var(--s2);border-radius:12px;padding:10px;margin-bottom:16px;border:1px solid var(--bd)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div onclick="document.getElementById('profPhotoInput').click()" style="cursor:pointer;position:relative">
          ${avatar(D.user.login,myPhoto(),34)}
          <div style="position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:var(--ac);border-radius:50%;border:2px solid var(--s2);font-size:8px;color:#fff;display:flex;align-items:center;justify-content:center">+</div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:12px;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${D.user.name}</div>
          <div style="font-size:10px;color:${D.user.mod?'var(--wn)':'var(--t3)'}">${D.user.mod?'⭐ Moderador':totalDaysOf(D.user.login)+' treinos'}</div>
        </div>
      </div>
      <button onclick="doLogout()" style="width:100%;background:var(--bd);color:var(--t2);border-radius:7px;padding:5px;font-size:11px;font-weight:600;cursor:pointer">Sair</button>
    </div>
    <nav style="flex:1;display:flex;flex-direction:column;gap:2px">
      ${TABS.map(([id,ic,lb])=>`<button onclick="goView('${id}')" style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-weight:${D.view===id?600:500};font-size:12px;text-align:left;background:${D.view===id?'var(--ab)':'transparent'};color:${D.view===id?'var(--ac)':'var(--t2)'}"><span>${ic}</span>${lb}</button>`).join('')}
    </nav>
    ${isWeekView?`<div style="margin-top:16px;border-top:1px solid var(--bd);padding-top:14px">
      <div style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Semana</div>
      <div style="display:flex;align-items:center;gap:4px;background:var(--s2);border-radius:8px;padding:5px 8px;border:1px solid var(--bd)">
        <button onclick="prevWeek()" style="color:var(--t3);cursor:pointer;font-size:14px;padding:0 3px">‹</button>
        <div style="flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--t2)">${weekLabel}</div>
        <button onclick="nextWeek()" style="color:${isNow?'var(--bd)':'var(--t3)'};cursor:${isNow?'default':'pointer'};font-size:14px;padding:0 3px" ${isNow?'disabled':''}>›</button>
      </div>
    </div>`:''}
  </div>`;

  const topbar=`<div style="position:sticky;top:0;z-index:50;background:var(--su);border-bottom:1px solid var(--bd);padding:8px 14px ${isWeekView?'':'8px'}">
    <div style="display:flex;justify-content:space-between;align-items:center${isWeekView?';margin-bottom:7px':''}">
      <div style="font-weight:700;font-size:17px;color:var(--ac)">💪 FitApp</div>
      <div style="display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:4px 8px">
        <div onclick="document.getElementById('profPhotoInput').click()" style="cursor:pointer">${avatar(D.user.login,myPhoto(),22)}</div>
        <span style="font-size:12px;font-weight:600;color:var(--tx)">${firstName(D.user.login)}</span>
        ${D.user.mod?`<span style="font-size:10px;color:var(--wn)">⭐</span>`:''}
        <button onclick="doLogout()" style="font-size:11px;color:var(--t3);cursor:pointer;padding:0 2px">sair</button>
      </div>
    </div>
    ${isWeekView?`<div style="display:flex;align-items:center;gap:6px;background:var(--s2);border-radius:9px;padding:5px 9px;border:1px solid var(--bd)">
      <button onclick="prevWeek()" style="color:var(--t3);cursor:pointer;font-size:15px">‹</button>
      <div style="flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--t2)">${weekLabel}</div>
      <button onclick="nextWeek()" style="color:${isNow?'var(--bd)':'var(--t3)'};cursor:${isNow?'default':'pointer'};font-size:15px" ${isNow?'disabled':''}>›</button>
    </div>`:''}
  </div>`;

  const botnav=`<div class="botnav">${TABS.map(([id,ic,lb])=>`<button onclick="goView('${id}')" style="flex:1;cursor:pointer;padding:7px 0;color:${D.view===id?'var(--ac)':'var(--t3)'};border-top:2px solid ${D.view===id?'var(--ac)':'transparent'}"><div style="font-size:17px">${ic}</div><div style="font-size:9px;font-weight:600;margin-top:1px">${lb}</div></button>`).join('')}</div>`;

  let body='';
  if(D.view==='feed')body=renderFeed(wd,today,isNow);
  else if(D.view==='log')body=renderLog(wd,today,isNow);
  else if(D.view==='dashboard')body=renderDashboard();
  else if(D.view==='perfil')body=renderPerfil();
  else if(D.view==='caixa')body=renderCaixa();
  else body=renderComingSoon(D.view);

  el.innerHTML=`${toastHtml}
    <input id="profPhotoInput" type="file" accept="image/*" style="display:none" onchange="onProfPhoto(this)"/>
    <div style="display:flex;min-height:100vh">
      ${sidebar}
      <div class="main" style="flex:1;max-width:560px;width:100%;margin:0 auto;padding-bottom:80px">
        ${topbar}
        ${body}
      </div>
    </div>
    ${botnav}
    ${renderModal()}`;
}

// ═══════════════════════════════════════════════════════════════
//  ABA FEED
// ═══════════════════════════════════════════════════════════════
function renderFeed(wd,today,isNow){
  const members=allMembers();
  const top5=[...members].map(m=>({m,n:countOf(m,D.week)})).sort((a,b)=>b.n-a.n||a.m.localeCompare(b.m)).slice(0,5);
  const cards=top5.map(({m,n})=>{
    const c=colorOf(m),isMe=m===D.user.login,pct=Math.min(1,n/GOAL);
    return`<button onclick="${isMe?"goView('log')":''}" style="flex-shrink:0;text-align:center;min-width:74px;background:var(--su);border:1.5px solid ${isMe?c:'var(--bd)'};border-radius:12px;padding:9px 7px;cursor:${isMe?'pointer':'default'};box-shadow:${isMe?`0 0 0 3px ${c}18`:'var(--sh)'}">
      <div style="position:relative;display:inline-flex;align-items:center;justify-content:center">${progressRing(pct,46,c)}<div style="position:absolute">${avatar(m,D.photos[m],29)}</div></div>
      <div style="font-size:10px;font-weight:600;color:${isMe?c:'var(--t2)'};margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:68px">${firstName(m)}</div>
      <div style="font-size:10px;color:${pct>=1?'var(--ok)':'var(--t3)'}">${n}/${GOAL}${n>GOAL?` <span style="color:var(--ac);font-size:8px">+${n-GOAL}</span>`:''}</div>
    </button>`;
  }).join('');

  const posts=feedPosts();
  const empty=isNow
    ?`<div style="text-align:center;padding:44px 0;color:var(--t3)"><div style="font-size:42px">🏋️</div><div style="font-size:14px;font-weight:600;color:var(--t2);margin-top:10px">Nenhum treino esta semana</div><div style="font-size:12px;margin-top:4px">Registre na aba 📅 Treinos!</div></div>`
    :`<div style="text-align:center;padding:44px 0;color:var(--t3)"><div style="font-size:42px">📅</div><div style="font-size:14px;font-weight:600;color:var(--t2);margin-top:10px">Nenhum treino nessa semana</div></div>`;

  const postsHtml=posts.length?posts.map(p=>{
    const likes=p.likes?Object.keys(p.likes):[];
    const comments=p.comments?Object.values(p.comments).sort((a,b)=>a.ts-b.ts):[];
    const iLiked=likes.includes(D.user.login);
    return`
    <div style="background:var(--su);border:1px solid var(--bd);border-radius:15px;margin-bottom:11px;overflow:hidden;box-shadow:var(--sh);animation:fadeUp .25s ease">
      <div style="display:flex;align-items:center;gap:8px;padding:11px 12px 7px">
        ${avatar(p.member,D.photos[p.member],36)}
        <div style="flex:1"><div style="font-weight:600;font-size:14px;color:var(--tx)">${dispName(p.member)}</div><div style="font-size:11px;color:var(--t3)">${timeAgo(p.ts)} atrás</div></div>
        <div style="font-size:10px;color:var(--t3);background:var(--s2);border-radius:6px;padding:2px 6px;border:1px solid var(--bd)">${new Date(p.date+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}</div>
      </div>
      ${p.image?`<img src="${p.image}" style="width:100%;max-height:300px;object-fit:cover"/>`:''}
      <div style="padding:9px 12px">
        <div style="font-weight:600;font-size:14px;color:var(--tx)">${p.title}</div>
        ${p.note?`<div style="font-size:12px;color:var(--t2);line-height:1.5;margin-top:2px">${p.note}</div>`:''}
      </div>
      <div style="padding:6px 12px 9px;display:flex;gap:14px;align-items:center;border-top:1px solid var(--bd)">
        <button onclick="toggleLike(${p.id})" style="cursor:pointer;display:flex;align-items:center;gap:5px;color:${iLiked?'var(--er)':'var(--t3)'};font-weight:600;font-size:13px">${iLiked?'❤️':'🤍'}${likes.length?` ${likes.length}`:''}</button>
        <button onclick="openComments(${p.id})" style="cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--t3);font-weight:600;font-size:13px">💬${comments.length?` ${comments.length}`:''}</button>
        ${likes.length?`<div style="margin-left:auto;font-size:10px;color:var(--t3)">${likes.slice(0,2).map(l=>firstName(l)).join(', ')}${likes.length>2?` +${likes.length-2}`:''}</div>`:''}
      </div>
      ${comments.length?`<div style="padding:0 12px 9px">${comments.slice(-2).map(cm=>`<div style="display:flex;gap:6px;margin-top:6px"><div style="font-size:12px"><span style="font-weight:600;color:${colorOf(cm.author)}">${firstName(cm.author)}</span> <span style="color:var(--t2)">${cm.text}</span></div></div>`).join('')}${comments.length>2?`<button onclick="openComments(${p.id})" style="cursor:pointer;color:var(--t3);font-size:11px;margin-top:4px">Ver todos os ${comments.length} comentários</button>`:''}</div>`:''}
    </div>`;
  }).join(''):empty;

  return`<div style="padding:10px 13px">
    ${members.length?`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px">${cards}</div>${members.length>5?`<div style="font-size:10px;color:var(--t3);text-align:center;margin:4px 0 6px">Top 5 · ${members.length} membros</div>`:''}`:''}
    <div style="background:var(--ab);border:1px solid var(--ac)22;border-radius:10px;padding:7px 11px;margin-bottom:11px;display:flex;gap:7px;align-items:center">
      <span style="font-size:15px">💡</span><span style="font-size:12px;color:var(--t2)">Registre treinos em <strong style="color:var(--ac)">📅 Treinos</strong> com foto.</span>
    </div>
    ${postsHtml}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  ABA TREINOS
// ═══════════════════════════════════════════════════════════════
function renderLog(wd,today,isNow){
  const login=D.user.login;
  const myDays=daysOf(login,D.week);
  const cnt=myDays.length, c=colorOf(login), pct=Math.min(1,cnt/GOAL);
  const posts=validPosts();
  const cells=wd.map((date,i)=>{
    const done=myDays.includes(date);
    const future=date>today;
    const dayPost=posts.find(p=>p.member===login && p.date===date);
    // dia vazio na semana atual → registrar; dia já treinado (com post) → editar/excluir
    const canRegister=isNow && !done && !future;
    const canEdit=done && !!dayPost; // só edita se houver um post associado
    const clickable=canRegister || canEdit;
    const action=canRegister?`openPost('${date}')`:canEdit?`openEditMenu(${dayPost.id})`:'';
    const inner=done&&dayPost?.image
      ?`<img src="${dayPost.image}" style="width:100%;height:100%;object-fit:cover"/>`
      :done?`<span style="color:${c};font-weight:700;font-size:13px">✓</span>`
      :canRegister?`<span style="font-size:11px;opacity:.25">📷</span>`:'';
    return`<div style="text-align:center">
      <div style="font-size:8px;color:var(--t3);margin-bottom:3px;font-weight:600">${DAYS[i]}</div>
      <button ${!clickable?'disabled':''} onclick="${action}" style="width:100%;aspect-ratio:1/1;border-radius:8px;border:1.5px solid ${done?c:date===today&&isNow?c+'55':'var(--bd)'};background:${done?c+'12':date===today&&isNow?c+'05':'var(--s2)'};cursor:${clickable?'pointer':'default'};opacity:${future?.3:1};display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0;position:relative">${inner}${canEdit?`<span style="position:absolute;top:1px;right:2px;font-size:8px;opacity:.7">✎</span>`:''}</button>
      <div style="font-size:8px;color:var(--t3);margin-top:2px">${new Date(date+'T00:00:00').getDate()}</div>
    </div>`;
  }).join('');

  return`<div style="padding:10px 13px">
    <div style="background:${isNow?'var(--ab)':'var(--s2)'};border:1px solid ${isNow?'var(--ac)22':'var(--bd)'};border-radius:10px;padding:7px 11px;margin-bottom:11px;font-size:12px;color:var(--t2)">${isNow?'📸 Toque num dia para registrar com foto. Dias extras contam no ranking!':'📅 Semana passada — registros só na semana atual.'}</div>
    <div style="background:var(--su);border-radius:14px;padding:12px;margin-bottom:11px;border:1px solid var(--bd);box-shadow:var(--sh)">
      <div style="font-size:9px;color:var(--t3);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Dias desta semana</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>
    </div>
    <div style="background:var(--su);border-radius:14px;padding:12px;border:1px solid var(--bd);box-shadow:var(--sh);display:flex;align-items:center;gap:12px">
      ${progressRing(pct,54,c)}
      <div style="flex:1">
        <div style="font-weight:700;font-size:15px;color:var(--tx)">${cnt} dia${cnt!==1?'s':''} ${isNow?'esta':'nessa'} semana</div>
        <div style="font-size:12px;color:var(--t2);margin-top:2px">${cnt>=GOAL?`🎉 Meta batida${cnt>GOAL?` · +${cnt-GOAL} bônus!`:''}`:isNow?`Faltam ${GOAL-cnt} dia${GOAL-cnt!==1?'s':''} para a meta`:'Meta não foi batida'}</div>
        ${cnt<GOAL?`<div style="font-size:11px;color:var(--er);font-weight:600;margin-top:3px">${isNow?'Multa potencial':'Multa'}: ${fmtMoney((GOAL-cnt)*FINE)}</div>`:''}
      </div>
    </div>
  </div>`;
}


// ═══════════════════════════════════════════════════════════════
//  ABA DASHBOARD — visão coletiva do grupo
// ═══════════════════════════════════════════════════════════════
function renderDashboard(){
  const members=allMembers();
  if(members.length===0)return`<div style="padding:50px 20px;text-align:center;color:var(--t3)"><div style="font-size:46px;margin-bottom:10px">📊</div><div style="font-weight:600;font-size:15px;color:var(--t2)">Sem membros ainda</div></div>`;

  const weeks=dashWeeks();
  const perWeek=weeks.map(w=>members.reduce((a,m)=>a+countOf(m,w),0));
  const maxWeek=Math.max(...perWeek,1);
  const ranking=[...members].map(m=>({m,total:totalDaysOf(m)})).sort((a,b)=>b.total-a.total||a.m.localeCompare(b.m));
  const maxRank=Math.max(...ranking.map(r=>r.total),1);
  const totalGroup=groupTotal();
  const avgWeek=weeks.length?(perWeek.reduce((a,b)=>a+b,0)/weeks.length).toFixed(1):'0';
  const bestWeek=Math.max(...perWeek,0);
  const saldo=groupPaid();
  const cashEvo=cashEvolution();
  const contribs=contributions().filter(c=>c.paid>0);
  const allZeroContrib=contribs.length===0;
  const maxContrib=Math.max(...contributions().map(c=>c.paid),1);

  const statCard=(icon,label,value,sub,col)=>`<div style="background:var(--su);border:1px solid var(--bd);border-radius:13px;padding:12px;box-shadow:var(--sh)">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:15px">${icon}</span><span style="font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.5px">${label}</span></div>
    <div style="font-weight:700;font-size:21px;color:${col}">${value}</div>
    <div style="font-size:10px;color:var(--t3);margin-top:1px">${sub}</div>
  </div>`;

  // Ranking vertical (barras coloridas, scroll horizontal)
  const barW=46;
  const rankingBars=ranking.map(r=>{
    const h=Math.max(8,(r.total/maxRank)*150);
    const c=colorOf(r.m);
    const isMe=r.m===D.user.login;
    return`<div style="flex-shrink:0;width:${barW}px;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t2);margin-bottom:3px">${r.total}</div>
      <div style="width:32px;height:${h}px;background:${c};border-radius:6px 6px 0 0;${isMe?`box-shadow:0 0 0 2px ${c}55`:''}"></div>
      <div style="font-size:9px;color:${isMe?c:'var(--t3)'};font-weight:${isMe?700:500};margin-top:5px;writing-mode:vertical-rl;transform:rotate(180deg);max-height:46px;overflow:hidden;white-space:nowrap">${firstName(r.m)}</div>
    </div>`;
  }).join('');

  // Evolução do caixa (linha + área)
  let cashChart='';
  if(cashEvo.length>=2){
    const W=300,H=110,P=24;
    const maxC=Math.max(...cashEvo.map(e=>e.total),1);
    const pts=cashEvo.map((e,i)=>{
      const x=P+(i/(cashEvo.length-1))*(W-P*2);
      const y=H-P-(e.total/maxC)*(H-P*2);
      return {x,y,total:e.total,week:e.week};
    });
    const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
    const area=`${line} L${pts[pts.length-1].x.toFixed(1)} ${H-P} L${pts[0].x.toFixed(1)} ${H-P} Z`;
    const dots=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="var(--ac)"/><text x="${p.x.toFixed(1)}" y="${(p.y-7).toFixed(1)}" text-anchor="middle" font-size="8" fill="var(--ac)" font-weight="600">${fmtMoney(p.total).replace('R$ ','R$')}</text>`).join('');
    const labels=pts.filter((_,i)=>i%2===0).map(p=>`<text x="${p.x.toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="var(--t3)">${fmtDate(p.week)}</text>`).join('');
    cashChart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      <path d="${area}" fill="var(--ac)" opacity="0.1"/>
      <path d="${line}" fill="none" stroke="var(--ac)" stroke-width="2" stroke-linejoin="round"/>
      ${dots}${labels}
    </svg>`;
  }else{
    cashChart=`<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">Sem dados de caixa ainda — multas aparecem após semanas encerradas</div>`;
  }

  return`<div style="padding:10px 13px">
    <div style="font-weight:700;font-size:18px;color:var(--tx);margin-bottom:2px">📊 Dashboard do grupo</div>
    <div style="font-size:12px;color:var(--t3);margin-bottom:12px">${members.length} membro${members.length!==1?'s':''} · dados acumulados</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      ${statCard('🏋️','Total treinos',totalGroup,'do grupo','var(--ac)')}
      ${statCard('💰','Saldo caixa',fmtMoney(saldo),'arrecadado','var(--wn)')}
      ${statCard('📈','Média semanal',avgWeek,'treinos/sem','var(--ok)')}
      ${statCard('🔥','Melhor semana',bestWeek,'treinos','var(--er)')}
    </div>

    <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;color:var(--tx);margin-bottom:2px">🏆 Ranking de treinos</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:12px">Total acumulado — ${members.length} participante${members.length!==1?'s':''}</div>
      <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;align-items:flex-end">${rankingBars}</div>
      ${members.length>6?`<div style="text-align:center;font-size:10px;color:var(--t3);margin-top:6px">← arraste para ver todos →</div>`:''}
    </div>

    <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;color:var(--tx);margin-bottom:2px">📅 Engajamento semanal</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:11px">Total de treinos do grupo por semana</div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:90px">
        ${weeks.map((w,i)=>{
          const h=Math.max(4,(perWeek[i]/maxWeek)*78);
          const isN=w===NOW;
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:9px;font-weight:700;color:var(--t2)">${perWeek[i]||''}</div>
            <div style="width:100%;height:${h}px;background:${isN?'var(--ac)':'var(--ac)88'};border-radius:4px 4px 0 0"></div>
            <div style="font-size:8px;color:${isN?'var(--ac)':'var(--t3)'};font-weight:${isN?700:400}">${fmtDate(w)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:14px">
      <div style="font-weight:700;font-size:14px;color:var(--tx);margin-bottom:2px">📈 Evolução do caixa</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:8px">Saldo acumulado semana a semana</div>
      ${cashChart}
    </div>

    <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh)">
      <div style="font-weight:700;font-size:14px;color:var(--tx);margin-bottom:2px">💸 Contribuição por participante</div>
      <div style="font-size:10px;color:var(--t3);margin-bottom:11px">Multas pagas acumuladas</div>
      ${allZeroContrib?`<div style="text-align:center;padding:14px;color:var(--ok);font-size:12px;font-weight:600">🎉 Ninguém pagou multa ainda!</div>`:contributions().map(({m,paid})=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="width:62px;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${firstName(m)}</div>
          <div style="flex:1;height:20px;background:var(--s2);border-radius:5px;overflow:hidden;position:relative">
            ${paid>0?`<div style="height:100%;width:${Math.max(14,(paid/maxContrib)*100)}%;background:${colorOf(m)};border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px"><span style="font-size:10px;font-weight:700;color:#fff">${fmtMoney(paid)}</span></div>`:''}
          </div>
          ${paid===0?`<span style="color:var(--ok);font-size:13px">✓</span>`:''}
        </div>`).join('')}
    </div>
  </div>`;
}


// ═══════════════════════════════════════════════════════════════
//  ABA PERFIL — estatísticas individuais + calendário mensal
// ═══════════════════════════════════════════════════════════════
function renderPerfil(){
  const login=D.user.login;
  const c=colorOf(login);
  const trained=allTrainedDays(login);
  const total=trained.size;
  const pos=rankPosition(login);
  const members=allMembers().length;
  const goalWeeks=weeksGoalHit(login);
  const activeW=activeWeeks().length;
  const goalRate=activeW?Math.round((goalWeeks/activeW)*100):0;
  const curWeekCount=countOf(login,NOW);
  const streak=goalStreak(login);
  const avg=avgPerWeek(login);
  const best=bestWeekCount(login);
  const bestLabel=best.week?`melhor: ${fmtDate(best.week)}`:'melhor<br>semana';
  const evolution=weeklyEvolution(login,8);
  const maxEvo=Math.max(...evolution.map(e=>e.count),GOAL);
  const myMods=Object.entries(myModalities(login)).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxMod=Math.max(...myMods.map(x=>x[1]),1);

  const [yy,mm]=D.profMonth.split('-').map(Number);
  const monthName=new Date(yy,mm-1,1).toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
  const firstDay=new Date(yy,mm-1,1);
  const daysInMonth=new Date(yy,mm,0).getDate();
  let startWeekday=firstDay.getDay();
  startWeekday=startWeekday===0?6:startWeekday-1;
  const todayISO=new Date().toISOString().slice(0,10);
  const curMonthISO=new Date().toISOString().slice(0,7);
  const isFutureMonth=D.profMonth>curMonthISO;
  let cells='';
  for(let i=0;i<startWeekday;i++)cells+=`<div></div>`;
  let monthTrainedCount=0;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${yy}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done=trained.has(iso);
    if(done)monthTrainedCount++;
    const isToday=iso===todayISO;
    cells+=`<div style="aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:9px;font-weight:600;background:${done?c:isToday?c+'18':'var(--s2)'};color:${done?'#fff':isToday?c:'var(--t3)'};border:1px solid ${done?c:isToday?c+'66':'transparent'}">${done?'✓':d}</div>`;
  }
  const weekdayHead=['S','T','Q','Q','S','S','D'].map(d=>`<div style="text-align:center;font-size:8px;color:var(--t3);font-weight:600">${d}</div>`).join('');

  const mini=(value,label,col)=>`<div style="background:var(--su);border:1px solid var(--bd);border-radius:11px;padding:10px 8px;text-align:center;box-shadow:var(--sh)">
    <div style="font-weight:700;font-size:18px;color:${col}">${value}</div>
    <div style="font-size:9px;color:var(--t3);margin-top:1px;line-height:1.2">${label}</div>
  </div>`;

  return`<div style="padding:10px 13px">
    <div style="display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,${c}14,var(--su));border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:12px">
      <div onclick="document.getElementById('profPhotoInput').click()" style="cursor:pointer;position:relative">
        ${avatar(login,myPhoto(),52)}
        <div style="position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;background:var(--ac);border-radius:50%;border:2px solid var(--su);font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center">+</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:17px;color:var(--tx)">${D.user.name}</div>
        <div style="font-size:11px;color:var(--t3)">${D.user.mod?'⭐ Moderador':'Membro'} · ${pos>0?`${pos}º de ${members} no ranking`:'—'}</div>
      </div>
      ${streak>0?`<div style="text-align:center;background:var(--wb);border:1px solid var(--wn)44;border-radius:10px;padding:6px 9px"><div style="font-size:18px">🔥</div><div style="font-size:9px;color:var(--wn);font-weight:700">${streak} sem</div></div>`:''}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px">
      ${mini(total,'treinos<br>totais','var(--ac)')}
      ${mini(`${curWeekCount}/${GOAL}`,'esta<br>semana',curWeekCount>=GOAL?'var(--ok)':'var(--wn)')}
      ${mini(`${goalRate}%`,'metas<br>batidas','var(--ok)')}
      ${mini(avg.toFixed(1),'média<br>semanal','var(--ac)')}
      ${mini(best.count,bestLabel,'var(--er)')}
      ${mini(`${goalWeeks}/${activeW}`,'semanas<br>na meta','var(--wn)')}
    </div>

    <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-weight:700;font-size:14px;color:var(--tx)">📈 Evolução semanal</div>
        <div style="font-size:10px;color:var(--t3)">últimas 8 semanas</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:5px;height:80px;position:relative">
        <div style="position:absolute;left:0;right:0;bottom:${(GOAL/maxEvo)*68}px;border-top:1.5px dashed var(--ok)55;z-index:1"></div>
        ${evolution.map(e=>{
          const h=Math.max(3,(e.count/maxEvo)*68);
          const hit=e.count>=GOAL;
          const isN=e.week===NOW;
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;z-index:2">
            <div style="font-size:9px;font-weight:700;color:${hit?'var(--ok)':'var(--t2)'}">${e.count||''}</div>
            <div style="width:100%;height:${h}px;background:${hit?'var(--ok)':isN?c:c+'66'};border-radius:3px 3px 0 0"></div>
            <div style="font-size:7px;color:${isN?'var(--ac)':'var(--t3)'};font-weight:${isN?700:400}">${fmtDate(e.week).split(' ')[0]}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:9px;color:var(--ok);margin-top:8px;display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:14px;border-top:1.5px dashed var(--ok)"></span> linha da meta (${GOAL}x)</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:12px;box-shadow:var(--sh)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <button onclick="prevProfMonth()" style="color:var(--t3);cursor:pointer;font-size:15px;padding:0 4px">‹</button>
          <div style="text-align:center"><div style="font-weight:700;font-size:11px;color:var(--tx);text-transform:capitalize">${monthName}</div><div style="font-size:8px;color:var(--t3)">${monthTrainedCount} treino${monthTrainedCount!==1?'s':''}</div></div>
          <button onclick="nextProfMonth()" style="color:${isFutureMonth?'var(--bd)':'var(--t3)'};cursor:${isFutureMonth?'default':'pointer'};font-size:15px;padding:0 4px" ${isFutureMonth?'disabled':''}>›</button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px">${weekdayHead}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
      </div>
      <div style="background:var(--su);border:1px solid var(--bd);border-radius:14px;padding:12px;box-shadow:var(--sh)">
        <div style="font-weight:700;font-size:12px;color:var(--tx);margin-bottom:10px">💪 Modalidades</div>
        ${myMods.length?myMods.map(([mod,count])=>`<div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px">${mod}</span><span style="color:var(--t3);font-weight:700">${count}</span></div>
          <div style="height:5px;background:var(--s2);border-radius:3px;overflow:hidden"><div style="height:100%;width:${(count/maxMod)*100}%;background:${c};border-radius:3px"></div></div>
        </div>`).join(''):`<div style="font-size:11px;color:var(--t3);text-align:center;padding:14px 0">Sem treinos ainda</div>`}
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  ABA CAIXA — multas e pagamentos
// ═══════════════════════════════════════════════════════════════
function renderCaixa(){
  const members=allMembers();
  const isMod=!!D.user.mod;
  const totalOwed=groupOwed();
  const totalPaid=groupPaid();

  const rows=members.map(m=>({
    m, owed:memberOwed(m), paid:memberPaid(m), fines:memberFines(m)
  })).sort((a,b)=>b.owed-a.owed||b.paid-a.paid);

  const memberCard=row=>{
    const {m,owed,paid,fines}=row;
    const isMe=m===D.user.login;
    const pending=fines.filter(f=>!f.paid);
    const settled=fines.filter(f=>f.paid);
    return`<div style="background:var(--su);border:1px solid var(--bd);border-radius:13px;padding:12px;box-shadow:var(--sh);margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:${fines.length?10:0}px">
        ${avatar(m,D.photos[m],34)}
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:13px;color:${isMe?colorOf(m):'var(--tx)'}">${dispName(m)}${isMe?' (você)':''}</div>
          <div style="font-size:11px;color:var(--t3)">${fines.length?`${fines.length} multa${fines.length!==1?'s':''}`:'Em dia ✓'}</div>
        </div>
        <div style="text-align:right">
          ${owed>0?`<div style="font-weight:700;font-size:15px;color:var(--er)">${fmtMoney(owed)}</div><div style="font-size:9px;color:var(--t3)">a pagar</div>`:`<div style="font-weight:700;font-size:15px;color:var(--ok)">✓</div><div style="font-size:9px;color:var(--t3)">quitado</div>`}
        </div>
      </div>
      ${pending.length?`<div style="display:flex;flex-direction:column;gap:5px">${pending.map(f=>`
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--eb);border:1px solid var(--er)22;border-radius:8px;padding:6px 9px">
          <div style="font-size:11px;color:var(--t2)">Semana de ${fmtDate(f.week)} · <span style="color:var(--er);font-weight:600">${fmtMoney(f.amount)}</span></div>
          ${isMod?`<button onclick="markPaid('${f.week}','${m}')" style="background:var(--ok);color:#fff;border-radius:6px;padding:4px 9px;font-size:10px;font-weight:600;cursor:pointer">Marcar pago</button>`:`<span style="font-size:10px;color:var(--t3)">pendente</span>`}
        </div>`).join('')}</div>`:''}
      ${settled.length?`<div style="margin-top:${pending.length?7:0}px;display:flex;flex-wrap:wrap;gap:5px">${settled.map(f=>`
        <div style="display:flex;align-items:center;gap:4px;background:var(--ob);border:1px solid var(--ok)22;border-radius:6px;padding:3px 7px;font-size:10px;color:var(--ok)">
          ✓ ${fmtDate(f.week)} · ${fmtMoney(f.amount)}${isMod?` <button onclick="unmarkPaid('${f.week}','${m}')" style="color:var(--t3);cursor:pointer;font-size:11px;margin-left:2px">✕</button>`:''}
        </div>`).join('')}</div>`:''}
    </div>`;
  };

  return`<div style="padding:10px 13px">
    <div style="background:linear-gradient(135deg,var(--ac)18,var(--su));border:1px solid var(--bd);border-radius:14px;padding:16px;box-shadow:var(--sh);margin-bottom:13px;text-align:center">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">💰 Caixa do grupo</div>
      <div style="font-weight:700;font-size:28px;color:var(--ac);margin:3px 0">${fmtMoney(totalPaid)}</div>
      <div style="font-size:11px;color:var(--t3)">arrecadado${totalOwed>0?` · <span style="color:var(--er);font-weight:600">${fmtMoney(totalOwed)} a receber</span>`:''}</div>
    </div>

    <div style="background:var(--ab);border:1px solid var(--ac)22;border-radius:10px;padding:8px 11px;margin-bottom:13px;display:flex;gap:7px;align-items:center">
      <span style="font-size:14px">ℹ️</span><span style="font-size:10px;color:var(--t2)">Multa de <strong>${fmtMoney(FINE)}</strong> por dia abaixo da meta (${GOAL}x/sem), em semanas já encerradas.${isMod?' Você é moderador: confirme os pagamentos.':' O moderador confirma os pagamentos.'}</span>
    </div>

    ${members.length?rows.map(memberCard).join(''):`<div style="text-align:center;padding:40px;color:var(--t3)"><div style="font-size:40px">💰</div><div style="font-size:13px;margin-top:8px">Sem membros ainda</div></div>`}

    ${rows.every(r=>r.fines.length===0)&&members.length?`<div style="text-align:center;padding:20px;color:var(--ok);font-size:13px;font-weight:600">🎉 Todo mundo em dia! Nenhuma multa por enquanto.</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  MODAIS
// ═══════════════════════════════════════════════════════════════
function renderModal(){
  if(D.modal==='comments')return renderCommentsModal();
  if(D.modal==='editMenu')return renderEditMenuModal();
  if(D.modal==='editPost')return renderEditPostModal();
  if(D.modal!=='post')return '';
  return renderPostModal();
}

// Menu de ações ao tocar num dia já treinado: Editar ou Excluir
function renderEditMenuModal(){
  const post=D.posts.find(p=>p.id===D.editId);
  if(!post)return '';
  const dl=new Date(post.date+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'});
  return`<div onclick="if(event.target===this)closeModal()" style="position:fixed;inset:0;background:var(--ov);z-index:800;display:flex;align-items:flex-end;justify-content:center">
    <div style="background:var(--su);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:520px;box-shadow:0 -8px 32px #00000033">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        ${post.image?`<img src="${post.image}" style="width:44px;height:44px;border-radius:8px;object-fit:cover"/>`:''}
        <div style="flex:1"><div style="font-weight:600;font-size:14px;color:var(--tx)">${post.title}</div><div style="font-size:11px;color:var(--t3);text-transform:capitalize">📅 ${dl}</div></div>
        <button onclick="closeModal()" style="color:var(--t3);font-size:19px;cursor:pointer;padding:4px">✕</button>
      </div>
      <button onclick="startEditPost(${post.id})" style="width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:11px;padding:13px;font-weight:600;font-size:14px;color:var(--tx);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:8px;justify-content:center">✎ Editar treino</button>
      <button onclick="deletePost(${post.id})" style="width:100%;background:var(--eb);border:1px solid var(--er)44;border-radius:11px;padding:13px;font-weight:600;font-size:14px;color:var(--er);cursor:pointer;display:flex;align-items:center;gap:8px;justify-content:center">🗑️ Excluir treino</button>
    </div>
  </div>`;
}

// Modal de edição: reaproveita o seletor de modalidade + foto + observação
function renderEditPostModal(){
  const post=D.posts.find(p=>p.id===D.editId);
  if(!post)return '';
  const c=colorOf(D.user.login);
  const img=D.postImg!==null?D.postImg:post.image;
  const hasImg=!!img;
  const ex=D.postExercise||post.title;
  return`<div onclick="if(event.target===this)closeModal()" style="position:fixed;inset:0;background:var(--ov);z-index:800;display:flex;align-items:flex-end;justify-content:center">
    <div style="background:var(--su);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 32px #00000033">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        ${avatar(D.user.login,myPhoto(),34)}
        <div><div style="font-weight:600;font-size:14px;color:var(--tx)">Editar Treino</div></div>
        <button onclick="closeModal()" style="margin-left:auto;color:var(--t3);font-size:19px;cursor:pointer;padding:4px">✕</button>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Foto</div>
        ${hasImg
          ?`<div style="position:relative"><img src="${img}" style="width:100%;border-radius:10px;max-height:190px;object-fit:cover"/><button onclick="changeEditPhoto()" style="position:absolute;bottom:6px;right:6px;background:#000a;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:600">Trocar foto</button></div>`
          :`<button onclick="document.getElementById('editImgInput').click()" style="width:100%;background:var(--s2);border:2px dashed var(--b2);border-radius:10px;padding:20px;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:28px">📷</span><span style="font-size:13px;color:var(--t2);font-weight:600">Adicionar foto</span></button>`}
        <input id="editImgInput" type="file" accept="image/*" style="display:none" onchange="onEditImg(this)"/>
      </div>
      <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Modalidade</div>
      <select id="editExercise" onchange="onEditExerciseChange(this)" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px;margin-bottom:8px;cursor:pointer">
        ${EXERCISES.map(e=>`<option value="${e}" ${ex===e?'selected':''}>${e}</option>`).join('')}
        ${!EXERCISES.includes(ex)?`<option value="${ex}" selected>${ex}</option>`:''}
      </select>
      ${(D.postExercise==='✍️ Outro')?`<input id="editOther" placeholder="Qual exercício?" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px;margin-bottom:8px"/>`:''}
      <textarea id="editNote" placeholder="Observações (opcional)" rows="2" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:13px;resize:none;margin-bottom:10px">${post.note||''}</textarea>
      <button onclick="saveEditPost()" ${D.posting?'disabled':''} style="width:100%;border-radius:10px;padding:12px;font-weight:600;font-size:14px;cursor:${D.posting?'not-allowed':'pointer'};background:${D.posting?'var(--bd)':c};color:${D.posting?'var(--t3)':'#fff'}">${D.posting?'Salvando...':'Salvar alterações ✓'}</button>
    </div>
  </div>`;
}

function renderCommentsModal(){
  const post=D.posts.find(p=>p.id===D.cmPost);
  if(!post)return '';
  const comments=post.comments?Object.values(post.comments).sort((a,b)=>a.ts-b.ts):[];
  return`<div onclick="if(event.target===this)closeModal()" style="position:fixed;inset:0;background:var(--ov);z-index:800;display:flex;align-items:flex-end;justify-content:center">
    <div style="background:var(--su);border-radius:18px 18px 0 0;padding:16px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 -8px 32px #00000033">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-weight:600;font-size:14px;color:var(--tx)">Comentários · ${comments.length}</div>
        <button onclick="closeModal()" style="color:var(--t3);font-size:19px;cursor:pointer;padding:4px">✕</button>
      </div>
      <div style="overflow-y:auto;flex:1;margin-bottom:10px">${comments.length?comments.map(cm=>`
        <div style="display:flex;gap:8px;margin-bottom:10px">
          ${avatar(cm.author,D.photos[cm.author],28)}
          <div style="flex:1"><div style="background:var(--s2);border-radius:10px;padding:7px 11px;border:1px solid var(--bd)"><span style="font-weight:600;font-size:12px;color:${colorOf(cm.author)}">${firstName(cm.author)}</span> <span style="font-size:13px;color:var(--t2)">${cm.text}</span></div><div style="font-size:10px;color:var(--t3);margin-top:2px;margin-left:3px">${timeAgo(cm.ts)} atrás</div></div>
        </div>`).join(''):`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">Seja o primeiro a comentar! 💬</div>`}</div>
      <div style="display:flex;gap:8px">
        <input id="cmInput" placeholder="Comentar..." onkeydown="onCommentKey(event,${post.id})" style="flex:1;background:var(--s2);border:1.5px solid var(--b2);border-radius:10px;padding:9px 12px;color:var(--tx);font-size:13px"/>
        <button onclick="sendComment(${post.id})" style="background:var(--ac);color:#fff;border-radius:10px;padding:0 14px;font-weight:600;cursor:pointer;font-size:16px">↑</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  MODAL DE REGISTRO DE TREINO
// ═══════════════════════════════════════════════════════════════
function renderPostModal(){
  if(D.modal!=='post')return'';
  const c=colorOf(D.user.login), hasImg=!!D.postImg;
  const canSubmit=hasImg && !!D.postExercise;
  const dl=D.postDate?new Date(D.postDate+'T00:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'}):'';
  return`<div onclick="if(event.target===this)closeModal()" style="position:fixed;inset:0;background:var(--ov);z-index:800;display:flex;align-items:flex-end;justify-content:center">
    <div style="background:var(--su);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 -8px 32px #00000033">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        ${avatar(D.user.login,myPhoto(),34)}
        <div><div style="font-weight:600;font-size:14px;color:var(--tx)">Registrar Treino</div>${dl?`<div style="font-size:11px;color:var(--t3)">📅 ${dl}</div>`:''}</div>
        <button onclick="closeModal()" style="margin-left:auto;color:var(--t3);font-size:19px;cursor:pointer;padding:4px">✕</button>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Foto <span style="color:var(--er)">*</span></div>
        ${hasImg
          ?`<div style="position:relative"><img src="${D.postImg}" style="width:100%;border-radius:10px;max-height:190px;object-fit:cover"/><button onclick="clearPostImg()" style="position:absolute;top:6px;right:6px;background:#000a;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px">✕</button></div>`
          :`<button onclick="document.getElementById('postImgInput').click()" style="width:100%;background:var(--s2);border:2px dashed var(--er)44;border-radius:10px;padding:20px;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px"><span style="font-size:28px">📷</span><span style="font-size:13px;color:var(--t2);font-weight:600">Adicionar foto</span><span style="font-size:11px">Obrigatória</span></button>`}
        <input id="postImgInput" type="file" accept="image/*" style="display:none" onchange="onPostImg(this)"/>
      </div>
      <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Modalidade <span style="color:var(--er)">*</span></div>
      <select id="postExercise" onchange="onExerciseChange(this)" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px;margin-bottom:8px;cursor:pointer">
        <option value="">Selecione...</option>
        ${EXERCISES.map(e=>`<option value="${e}" ${D.postExercise===e?'selected':''}>${e}</option>`).join('')}
      </select>
      ${D.postExercise==='✍️ Outro'?`<input id="postOther" placeholder="Qual exercício?" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px;margin-bottom:8px"/>`:''}
      <textarea id="postNote" placeholder="Observações (opcional)" rows="2" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:13px;resize:none;margin-bottom:10px"></textarea>
      <button onclick="submitPost()" ${D.posting?'disabled':''} style="width:100%;border-radius:10px;padding:12px;font-weight:600;font-size:14px;cursor:${D.posting?'not-allowed':'pointer'};background:${D.posting?'var(--bd)':canSubmit?c:'var(--bd)'};color:${D.posting||!canSubmit?'var(--t3)':'#fff'}">
        ${D.posting?'Registrando...':!hasImg?'Adicione a foto':!D.postExercise?'Escolha a modalidade':'Registrar treino ✓'}
      </button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  TELA DE LOGIN
// ═══════════════════════════════════════════════════════════════
function renderLogin(){
  const n=Object.keys(D.users).length;
  if(D.loginMode==='choose')return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px">
    <div style="width:100%;max-width:340px;text-align:center">
      <div style="width:68px;height:68px;border-radius:50%;background:var(--ab);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px">🏋️</div>
      <div style="font-weight:700;font-size:22px;color:var(--tx);margin-bottom:4px">FitApp</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:24px">Fitness com responsabilidade</div>
      <button onclick="goLoginMode()" style="width:100%;background:var(--ac);color:#fff;border-radius:12px;padding:13px;font-weight:600;font-size:15px;cursor:pointer;margin-bottom:9px">Entrar</button>
      <button onclick="goRegisterMode()" style="width:100%;background:var(--su);color:var(--ac);border:2px solid var(--ac);border-radius:12px;padding:12px;font-weight:600;font-size:15px;cursor:pointer">Criar conta</button>
      <div style="margin-top:12px;font-size:11px;color:var(--t3)">${n} membro${n!==1?'s':''} cadastrado${n!==1?'s':''}</div>
    </div>
  </div>`;

  const isReg=D.loginMode==='register', first=isReg&&!n;
  return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px">
    <div style="width:100%;max-width:340px">
      <button onclick="goChooseMode()" style="color:var(--ac);font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;padding:0">← Voltar</button>
      <div style="font-weight:700;font-size:19px;color:var(--tx);margin-bottom:3px">${isReg?'Criar conta':'Entrar'}</div>
      <div style="font-size:13px;color:var(--t2);margin-bottom:18px">${isReg?'Formato: <strong>nome.sobrenome</strong>':'Login e senha'}</div>
      ${first?`<div style="background:var(--wb);border:1px solid var(--wn)44;border-radius:10px;padding:8px 11px;margin-bottom:12px;font-size:12px;color:var(--t2)">⭐ Você será o <strong>moderador</strong> por ser o primeiro!</div>`:''}
      <div style="background:var(--su);border:1px solid var(--bd);border-radius:18px;padding:20px;box-shadow:var(--sm)">
        <div style="margin-bottom:10px">
          <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Login</div>
          <input id="inpLogin" placeholder="${isReg?'ex: joao.silva':'nome.sobrenome'}" onkeydown="onLoginKey(event)" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px"/>
          ${isReg?`<div style="font-size:10px;color:var(--t3);margin-top:3px">Só letras, um ponto entre nome e sobrenome</div>`:''}
        </div>
        <div style="margin-bottom:${isReg?10:14}px">
          <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Senha</div>
          <div style="position:relative">
            <input id="inpPw" type="password" placeholder="Mínimo 4 caracteres" onkeydown="onLoginKey(event)" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 38px 10px 12px;color:var(--tx);font-size:14px"/>
            <button onclick="togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--t3);cursor:pointer;font-size:16px">👁️</button>
          </div>
        </div>
        ${isReg?`<div style="margin-bottom:14px">
          <div style="font-size:10px;color:var(--t3);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:1px">Confirmar senha</div>
          <input id="inpPw2" type="password" placeholder="Repita a senha" onkeydown="onRegisterKey(event)" style="width:100%;background:var(--s2);border:1.5px solid var(--b2);border-radius:9px;padding:10px 12px;color:var(--tx);font-size:14px"/>
        </div>`:''}
        <div id="loginErr" style="display:none;color:var(--er);font-size:12px;font-weight:600;margin-bottom:9px;background:var(--eb);border:1px solid var(--er)33;border-radius:8px;padding:6px 10px"></div>
        <button onclick="${isReg?'doRegister()':'doLogin()'}" style="width:100%;background:var(--ac);color:#fff;border-radius:10px;padding:12px;font-weight:600;font-size:14px;cursor:pointer">${isReg?'Criar conta →':'Entrar →'}</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  HANDLERS — todos expostos no window ANTES de qualquer render
// ═══════════════════════════════════════════════════════════════
window.goView=v=>{D.view=v;render()};
window.prevProfMonth=()=>{const[y,m]=D.profMonth.split('-').map(Number);const d=new Date(y,m-2,1);D.profMonth=d.toISOString().slice(0,7);render()};
window.nextProfMonth=()=>{const[y,m]=D.profMonth.split('-').map(Number);const d=new Date(y,m,1);const next=d.toISOString().slice(0,7);if(next<=new Date().toISOString().slice(0,7)){D.profMonth=next;render()}};
window.prevWeek=()=>{const d=new Date(D.week+'T00:00:00');d.setDate(d.getDate()-7);D.week=monday(d);render()};
window.nextWeek=()=>{const d=new Date(D.week+'T00:00:00');d.setDate(d.getDate()+7);const n=monday(d);if(n<=NOW){D.week=n;render()}};
window.doLogout=()=>{if(confirm('Sair da conta?')){saveSession(null);D.user=null;D.view='feed';D.week=NOW;D.loginMode='choose';render()}};

window.goLoginMode=()=>{D.loginMode='login';render()};
window.goRegisterMode=()=>{D.loginMode='register';render()};
window.goChooseMode=()=>{D.loginMode='choose';render()};
window.togglePw=()=>{const i=document.getElementById('inpPw');if(i)i.type=i.type==='password'?'text':'password'};
window.onLoginKey=e=>{if(e.key==='Enter'){D.loginMode==='register'?doRegister():doLogin()}};
window.onRegisterKey=e=>{if(e.key==='Enter')doRegister()};

window.doLogin=()=>{
  const typed=(document.getElementById('inpLogin')?.value||'').trim().toLowerCase();
  const login=keyOf(typed);
  const pw=document.getElementById('inpPw')?.value||'';
  const err=document.getElementById('loginErr');
  const show=m=>{if(err){err.style.display='block';err.textContent=m}};
  if(err)err.style.display='none';
  if(!typed)return show('⚠ Digite seu login.');
  if(!D.users[login])return show('⚠ Login não encontrado.');
  if(pw!==D.pw[login])return show('⚠ Senha incorreta.');
  const u={login,name:dispName(login),mod:!!D.users[login]?.mod};
  saveSession(u);D.user=u;resetInactivity();render();
};

window.doRegister=async()=>{
  const typed=(document.getElementById('inpLogin')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('inpPw')?.value||'';
  const pw2=document.getElementById('inpPw2')?.value||'';
  const err=document.getElementById('loginErr');
  const show=m=>{if(err){err.style.display='block';err.textContent=m}};
  if(err)err.style.display='none';
  if(!typed||!validLogin(typed))return show('⚠ Formato: nome.sobrenome (só letras).');
  const login=keyOf(typed); // chave interna sem ponto
  if(D.users[login])return show('⚠ Este login já está em uso.');
  if(pw.length<4)return show('⚠ Senha mínima de 4 caracteres.');
  if(pw!==pw2)return show('⚠ As senhas não coincidem.');
  const isMod=!Object.keys(D.users).length;
  try{
    await fbset(`users/${login}`,{name:dispName(login),mod:isMod,createdAt:Date.now()});
    await fbset(`passwords/${login}`,pw);
  }catch(e){
    return show('⚠ Erro ao salvar: '+(e?.message||e));
  }
  const u={login,name:dispName(login),mod:isMod};
  saveSession(u);D.user=u;resetInactivity();render();
  toast(`Bem-vindo, ${dispName(login)}! 🎉`);
};

window.onProfPhoto=inp=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{await fbset(`photos/${D.user.login}`,e.target.result);toast('Foto de perfil atualizada! 📸')};r.readAsDataURL(f)};

window.openPost=date=>{
  const week=monday(new Date(date+'T00:00:00'));
  if(daysOf(D.user.login,week).includes(date))return;
  D.postDate=date;D.postImg=null;D.postExercise='';D.modal='post';render();
};
window.closeModal=()=>{D.modal=null;D.postDate=null;D.postImg=null;D.postExercise='';D.cmPost=null;D.editId=null;D.posting=false;render()};
window.clearPostImg=()=>{D.postImg=null;render()};
window.onPostImg=inp=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{D.postImg=e.target.result;render()};r.readAsDataURL(f)};
// Ao trocar a modalidade no seletor, guarda no estado (pra exibir o campo "Outro" quando preciso)
window.onExerciseChange=sel=>{D.postExercise=sel.value;render()};

window.submitPost=async()=>{
  if(D.posting)return;
  let title=D.postExercise;
  if(title==='✍️ Outro'){
    title=(document.getElementById('postOther')?.value||'').trim();
    if(!title)return toast('Escreva qual exercício!',true);
  }
  const note=document.getElementById('postNote')?.value||'';
  if(!title)return toast('Selecione a modalidade!',true);
  if(!D.postImg)return toast('Foto é obrigatória!',true);
  D.posting=true;render();
  const date=D.postDate;
  const week=monday(new Date(date+'T00:00:00'));
  // grava o treino — uma vez, no Firebase. As abas Feed/Perfil/Dashboard derivam disto.
  const prev=daysOf(D.user.login,week);
  if(!prev.includes(date)){
    const updated=[...prev,date];
    if(!D.workouts[week])D.workouts[week]={};
    D.workouts[week][D.user.login]=updated; // atualização local imediata
    await fbset(`workouts/${week}/${D.user.login}`,updated);
  }
  // grava o post (foto + exercício) com campos vazios de likes/comments
  const id=Date.now();
  await fbset(`posts/${id}`,{id,member:D.user.login,date,title,note,image:D.postImg,ts:id,likes:{},comments:{}});
  D.week=week;D.modal=null;D.postDate=null;D.postImg=null;D.postExercise='';D.posting=false;D.view='log';render();
  toast('Treino registrado! 💪');
};

// ═══════════════════════════════════════════════════════════════
//  EDITAR / EXCLUIR TREINO (só o dono do registro)
// ═══════════════════════════════════════════════════════════════
window.openEditMenu=id=>{
  const post=D.posts.find(p=>p.id===id);
  if(!post||post.member!==D.user.login)return; // só o dono
  D.editId=id;D.modal='editMenu';render();
};
window.startEditPost=id=>{
  const post=D.posts.find(p=>p.id===id);
  if(!post)return;
  D.editId=id;D.postImg=null;D.postExercise='';D.modal='editPost';render();
};
window.onEditExerciseChange=sel=>{D.postExercise=sel.value;render()};
window.changeEditPhoto=()=>document.getElementById('editImgInput')?.click();
window.onEditImg=inp=>{const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{D.postImg=e.target.result;render()};r.readAsDataURL(f)};

window.saveEditPost=async()=>{
  if(D.posting)return;
  const post=D.posts.find(p=>p.id===D.editId);
  if(!post)return;
  let title=D.postExercise||post.title;
  if(title==='✍️ Outro'){
    title=(document.getElementById('editOther')?.value||'').trim();
    if(!title)return toast('Escreva qual exercício!',true);
  }
  const note=document.getElementById('editNote')?.value||'';
  const image=D.postImg!==null?D.postImg:post.image;
  D.posting=true;render();
  // atualiza os campos editáveis do post (mantém id, member, date, ts, likes, comments)
  const updated={...post,title,note,image};
  D.posts=D.posts.map(p=>p.id===post.id?updated:p); // local imediato
  await fbset(`posts/${post.id}`,updated);
  D.modal=null;D.editId=null;D.postImg=null;D.postExercise='';D.posting=false;render();
  toast('Treino atualizado! ✓');
};

window.deletePost=async id=>{
  const post=D.posts.find(p=>p.id===id);
  if(!post||post.member!==D.user.login)return;
  if(!confirm('Excluir este treino? O dia deixará de contar na sua meta.'))return;
  const date=post.date;
  const week=monday(new Date(date+'T00:00:00'));
  // remove o post
  D.posts=D.posts.filter(p=>p.id!==id);
  await fbset(`posts/${id}`,null);
  // remove o dia do workout SE não houver outro post do mesmo dia
  const stillHasPost=D.posts.some(p=>p.member===D.user.login && p.date===date);
  if(!stillHasPost){
    const remaining=daysOf(D.user.login,week).filter(d=>d!==date);
    if(D.workouts[week])D.workouts[week][D.user.login]=remaining;
    await fbset(`workouts/${week}/${D.user.login}`,remaining.length?remaining:null);
  }
  D.modal=null;D.editId=null;render();
  toast('Treino excluído.');
};

// ═══════════════════════════════════════════════════════════════
//  CAIXA — confirmar/desfazer pagamento (só moderador)
// ═══════════════════════════════════════════════════════════════
window.markPaid=async(week,login)=>{
  if(!D.user.mod)return toast('Só o moderador pode confirmar.',true);
  D.payments={...D.payments,[`${week}_${login}`]:true}; // local imediato
  render();
  try{await fbset(`payments/${week}_${login}`,true);}catch(e){toast('Erro ao salvar',true)}
  toast('Pagamento confirmado ✓');
};
window.unmarkPaid=async(week,login)=>{
  if(!D.user.mod)return;
  if(!confirm('Desfazer este pagamento? A multa volta a ficar pendente.'))return;
  const copy={...D.payments};delete copy[`${week}_${login}`];
  D.payments=copy;render();
  try{await fbset(`payments/${week}_${login}`,null);}catch(e){}
  toast('Pagamento desfeito.');
};

// ═══════════════════════════════════════════════════════════════
//  LIKES E COMENTÁRIOS
// ═══════════════════════════════════════════════════════════════
window.toggleLike=async id=>{
  const post=D.posts.find(p=>p.id===id);
  if(!post)return;
  const me=D.user.login;
  const likes={...(post.likes||{})};
  if(likes[me])delete likes[me]; else likes[me]=true;
  post.likes=likes; // atualização local imediata
  render();
  try{await fbset(`posts/${id}/likes`,Object.keys(likes).length?likes:null);}catch(e){}
};

window.openComments=id=>{D.cmPost=id;D.modal='comments';render()};
window.onCommentKey=(e,id)=>{if(e.key==='Enter'){e.preventDefault();sendComment(id)}};
window.sendComment=async id=>{
  const inp=document.getElementById('cmInput');
  const text=(inp?.value||'').trim();
  if(!text)return;
  const post=D.posts.find(p=>p.id===id);
  if(!post)return;
  const ts=Date.now();
  const comment={author:D.user.login,text,ts};
  post.comments={...(post.comments||{}),[ts]:comment}; // local imediato
  if(inp)inp.value='';
  render();
  // foca de novo no campo após o render
  setTimeout(()=>{const i=document.getElementById('cmInput');if(i)i.focus()},0);
  try{await fbset(`posts/${id}/comments/${ts}`,comment);}catch(e){}
};

// ═══════════════════════════════════════════════════════════════
//  INICIA
// ═══════════════════════════════════════════════════════════════
render();
</script>
</body>
</html>
